name: spy_game
description: "Offline party word game - Spy Game"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  # Database
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5
  # Navigation
  go_router: ^17.3.0
  # Localization
  easy_localization: ^3.0.7
  # IAP
  in_app_purchase: ^3.2.0
  # Utils
  logger: ^2.3.0
  shared_preferences: ^2.5.3
  myket_iap: ^1.1.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^4.0.3
  isar_community_generator: ^3.3.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-UI-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-UI-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-UI-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-UI-Black.ttf
          weight: 900
    - family: Vazirmatn FD
      fonts:
        - asset: assets/fonts/Vazirmatn-UI-FD-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-UI-FD-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-UI-FD-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-UI-FD-Black.ttf
          weight: 900
